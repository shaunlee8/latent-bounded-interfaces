name: lbi
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel
  - ninja
  - cmake
  - packaging
  - numpy
  - matplotlib
  - pytest
  - pytorch
  - pytorch-cuda=12.1
  - cuda-nvcc=12.1
  - pip:
      - --no-build-isolation
      - causal-conv1d==1.6.1
      - datasets
      - einops
      - huggingface_hub
      - sentencepiece
      - transformers
      - triton
